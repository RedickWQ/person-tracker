name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy API Worker
        run: npx wrangler deploy worker.js --config wrangler.toml --domains formattext2.com
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Pages
        run: |
          echo "=== Cloudflare Pages Deployment ==="

          # Check if project exists
          echo "Checking for existing Pages projects..."
          npx wrangler pages project list 2>&1 || true

          # Create project if needed (ignore errors if it exists)
          echo ""
          echo "Ensuring person-tracker project exists..."
          npx wrangler pages project create person-tracker --production-branch=main 2>&1 || true

          # Deploy to production branch (main)
          echo ""
          echo "Deploying to production (main branch)..."
          npx wrangler pages deploy dist --project-name=person-tracker --branch=main 2>&1

          echo ""
          echo "=== Deployment Complete ==="
          echo "Check Cloudflare Dashboard for deployment status"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

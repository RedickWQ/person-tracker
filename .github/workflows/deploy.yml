name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy API Worker
        run: npx wrangler deploy worker.js --config wrangler.toml --domains formattext2.com
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Pages
        run: |
          echo "=== Deploying to Cloudflare Pages ==="
          echo "Listing existing Pages projects..."
          npx wrangler pages project list 2>/dev/null || echo "No existing projects"
          echo ""
          echo "Creating or updating Pages project..."
          npx wrangler pages project create person-tracker --production-branch=production 2>&1 || echo "Project may already exist"
          echo ""
          echo "Deploying to Pages..."
          npx wrangler pages deploy dist --project-name=person-tracker --branch=production 2>&1
          echo ""
          echo "=== Deployment Complete ==="
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
